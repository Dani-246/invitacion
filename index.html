<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación Día de la Madre</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(180deg, #8b0000, #ffffff, #b30000);
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .open-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.7);
      z-index: 10;
      transition: 1s;
    }

    .open-btn {
      margin-top: 20px;
      padding: 15px 35px;
      border: none;
      border-radius: 40px;
      background: white;
      color: #a00000;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      transition: .3s;
      box-shadow: 0 0 20px rgba(255,255,255,0.5);
    }

    .open-btn:hover {
      transform: scale(1.08);
    }

    .card {
      width: 340px;
      height: 600px;
      border-radius: 30px;
      background: rgba(120,0,0,0.55);
      backdrop-filter: blur(10px);
      border: 3px solid rgba(255,255,255,0.4);
      padding: 20px;
      color: white;
      text-align: center;
      position: relative;
      overflow: hidden;
      display: none;
      animation: fadeIn 1.5s ease;
    }

    .flowers {
      position: absolute;
      font-size: 30px;
      animation: float 4s infinite ease-in-out;
    }

    .f1 { top: 20px; left: 20px; }
    .f2 { top: 20px; right: 20px; }
    .f3 { bottom: 60px; left: 20px; }
    .f4 { bottom: 60px; right: 20px; }

    h1 {
      margin-top: 40px;
      font-size: 32px;
      line-height: 1.1;
      text-shadow: 0 0 10px rgba(0,0,0,0.4);
    }

    .line {
      width: 80px;
      height: 3px;
      background: white;
      margin: 12px auto;
      border-radius: 10px;
    }

    .text {
      margin-top: 14px;
      font-size: 18px;
      line-height: 1.4;
      background: rgba(0,0,0,0.18);
      padding: 14px;
      border-radius: 18px;
      color: #fff;
    }

    .info {
      margin-top: 18px;
      background: rgba(0,0,0,0.18);
      padding: 16px;
      border-radius: 20px;
      font-size: 18px;
      line-height: 1.6;
      color: #fff;
    }

    .dress {
      margin-top: 18px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(139,0,0,0.35);
      font-size: 17px;
      color: #fff;
    }

    .footer {
      position: absolute;
      bottom: 12px;
      left: 0;
      width: 100%;
      font-size: 14px;
      opacity: .9;
      color: #fff;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>
<body>

<div class="envelope-screen" id="openScreen">
  <div class="envelope" onclick="openInvitation()">
    <div class="top"></div>
    <div class="letter">
      <p>💌</p>
      <span>Abrir Invitación</span>
    </div>
  </div>
</div>

<div class="card" id="card">

  <div class="flowers f1">🌹</div>
  <div class="flowers f2">❤️</div>
  <div class="flowers f3">🤍</div>
  <div class="flowers f4">🌹</div>

  <h1>Día de la Madre</h1>

  <div class="line"></div>

  <div class="text">
    Madres queridas,<br>
    están cordialmente invitadas.
  </div>

  <div class="info">
    📅 Viernes 15 de Mayo<br>
    ⏰ 4:20 PM<br>
    📍 Centro Educativo
  </div>

  <div class="dress">
    ❤️ Código de vestimenta:<br>
    Rojo o Blanco 🤍
  </div>

  <div class="footer" style="padding:0 20px;">
    ✨ ¡Las esperamos con mucho cariño! ✨
  </div>
</div>

<audio id="music" autoplay loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8a73467.mp3" type="audio/mpeg">
</audio>

<style>
.envelope-screen {
  position: absolute;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(180deg,#5e0000,#8b0000);
  z-index: 20;
  transition: 1s;
}

.envelope {
  width: 280px;
  height: 180px;
  background: #b30000;
  position: relative;
  cursor: pointer;
  border-radius: 10px;
  box-shadow: 0 0 40px rgba(0,0,0,0.4);
  animation: float 3s infinite ease-in-out;
}

.top {
  position: absolute;
  top: 0;
  left: 0;
  width: 0;
  height: 0;
  border-left: 140px solid transparent;
  border-right: 140px solid transparent;
  border-top: 90px solid #ff4d4d;
  transform-origin: top;
  transition: 1s;
  z-index: 3;
}

.letter {
  position: absolute;
  width: 240px;
  height: 140px;
  background: #fff5f5;
  top: 20px;
  left: 20px;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: #8b0000;
  font-weight: bold;
  font-size: 22px;
  transition: 1s;
}

.letter p {
  font-size: 40px;
}

.card {
  background: rgba(120,0,0,0.55);
}

.text,
.info,
.dress {
  background: rgba(0,0,0,0.18);
  color: #fff;
}

.text {
  font-size: 22px;
}

.info {
  font-size: 21px;
}

.dress {
  font-size: 20px;
}

.footer {
  color: #fff;
}
</style>

<script>
  function openInvitation() {
    document.querySelector('.top').style.transform = 'rotateX(180deg)';
    document.querySelector('.letter').style.transform = 'translateY(-120px)';

    setTimeout(() => {
      document.getElementById('openScreen').style.opacity = '0';

      setTimeout(() => {
        document.getElementById('openScreen').style.display = 'none';
        document.getElementById('card').style.display = 'block';
        document.getElementById('music').play();
      }, 1000);
    }, 1200);
  }
</script>

</body>
</html>
